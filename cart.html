<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Heavenly Wear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar"><div class="logo" onclick="location.href='index.html'">Heavenly Wear</div></nav>
    <div class="container" style="padding: 50px 0;">
        <h1>Shopping Cart</h1>
        <div id="cartItems"></div>
        <div id="checkoutForm" style="margin-top: 40px; background: #f9f9f9; padding: 30px; border-radius: 20px;">
            <h3>Rincian Pembayaran</h3>
            <p>Subtotal: <span id="subTotal"></span></p>
            <p>Ongkir: 
                <select id="ongkir" onchange="calcTotal()">
                    <option value="10000">Reguler (10.000)</option>
                    <option value="25000">Kilat (25.000)</option>
                </select>
            </p>
            <p>Metode Pembayaran: 
                <select id="payment">
                    <option>Bank Transfer (BCA)</option>
                    <option>Gopay / ShopeePay</option>
                </select>
            </p>
            <hr>
            <h2>Total Bayar: <span id="totalBayar" style="color: #F06292;"></span></h2>
            <button onclick="finalOrder()" class="btn-primary" style="width: 100%; margin-top: 20px;">Konfirmasi Pesanan Sekarang</button>
        </div>
    </div>

    <script>
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('heavenlyCart')) || [];
            const cont = document.getElementById('cartItems');
            let sub = 0;

            cont.innerHTML = cart.map((item, i) => {
                sub += (item.price * item.qty);
                return `<div style="display:flex; justify-content:space-between; padding:20px; background:white; margin-bottom:10px; border-radius:15px;">
                    <div><b>${item.name}</b> (${item.color}) x ${item.qty}</div>
                    <div>Rp ${(item.price * item.qty).toLocaleString()}</div>
                    <button onclick="delItem(${i})" style="color:red; border:none; background:none; cursor:pointer">Hapus</button>
                </div>`;
            }).join('');
            
            document.getElementById('subTotal').innerText = "Rp " + sub.toLocaleString();
            localStorage.setItem('tempSub', sub);
            calcTotal();
        }

        function calcTotal() {
            const sub = parseInt(localStorage.getItem('tempSub'));
            const ong = parseInt(document.getElementById('ongkir').value);
            document.getElementById('totalBayar').innerText = "Rp " + (sub + ong).toLocaleString();
        }

        function delItem(i) {
            let cart = JSON.parse(localStorage.getItem('heavenlyCart'));
            cart.splice(i, 1);
            localStorage.setItem('heavenlyCart', JSON.stringify(cart));
            renderCart();
        }

        function finalOrder() {
            if(confirm("Apakah Anda yakin data sudah benar?")) {
                alert("Pesanan Diterima! Mengarahkan ke WhatsApp Admin...");
                location.href = "https://wa.me/628123456789";
            }
        }

        renderCart();
    </script>
</body>
</html>
